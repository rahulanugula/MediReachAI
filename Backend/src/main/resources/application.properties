server.port=8080

# H2 in-memory database (auto-resets on restart)
spring.datasource.url=jdbc:h2:mem:medireach;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Let Hibernate figure out the dialect from the datasource driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

logging.level.root=WARN
logging.level.com.medireachai=INFO
