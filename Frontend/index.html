<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MediReach AI - AI-powered rural healthcare platform with triage, telemedicine, and patient management." />
    <title>MediReach AI - Healthcare Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (window.location.protocol === 'file:') {
        document.getElementById('root').innerHTML = `
          <main style="min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(180deg,#f8fafc 0%,#e2e8f0 100%);font-family:Segoe UI,Arial,sans-serif;color:#0f172a;">
            <section style="max-width:720px;background:#ffffff;border:1px solid #cbd5e1;border-radius:24px;padding:32px;box-shadow:0 20px 45px rgba(15,23,42,.08);">
              <p style="margin:0 0 8px;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#2563eb;">Launch Help</p>
              <h1 style="margin:0 0 12px;font-size:32px;line-height:1.1;">MediReach AI needs a Vite launch path</h1>
              <p style="margin:0 0 16px;font-size:15px;line-height:1.7;color:#475569;">You opened the source file <code>Frontend/index.html</code> directly, so the React app cannot compile and mount from here.</p>
              <p style="margin:0 0 10px;font-size:14px;font-weight:700;">Use one of these instead:</p>
              <ol style="margin:0 0 16px 20px;padding:0;color:#334155;line-height:1.8;">
                <li>Run <code>npm run dev</code> inside <code>MediReachAI/Frontend</code> and open the localhost URL.</li>
                <li>Run <code>npm run build</code> and then open <code>Frontend/dist/index.html</code>.</li>
              </ol>
              <p style="margin:0;font-size:13px;color:#64748b;">This project is now configured so the built <code>dist/index.html</code> can be opened locally from the file system.</p>
            </section>
          </main>`;
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
